<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>駅で起こして | 公式サイト</title>
    <meta
      name="description"
      content="駅で起こして - 電車での寝過ごしを防ぐためのアラームアプリ公式サイト。"
    />
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #1565c0;
        --primary-strong: #0d47a1;
        --line: #dbe4f0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Segoe UI", sans-serif;
        background: linear-gradient(160deg, #f5f7fb 0%, #eef4ff 100%);
        color: var(--text);
      }
      .container {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px 16px 56px;
      }
      .hero {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }
      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.25;
      }
      .subtitle {
        margin-top: 10px;
        color: var(--muted);
        line-height: 1.7;
      }
      .section {
        margin-top: 14px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      p {
        margin: 8px 0;
        line-height: 1.7;
      }
      ul {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      li {
        margin: 6px 0;
        line-height: 1.6;
      }
      .links a {
        display: inline-block;
        margin: 8px 10px 0 0;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid var(--primary);
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }
      .links a.primary {
        background: var(--primary);
        color: #fff;
      }
      .links a:hover {
        opacity: 0.9;
      }
      footer {
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
      }
      @media (max-width: 640px) {
        h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <h1>駅で起こして</h1>
        <p class="subtitle">
          電車での寝過ごしを防ぐためのアラームアプリです。目的駅を設定し、通知・バイブ・アラームで降車タイミングをお知らせします。
        </p>
      </section>

      <section class="section">
        <h2>サポート</h2>
        <p>
          ご質問・不具合報告は下記よりご連絡ください。
        </p>
        <div class="links">
          <a class="primary" href="https://x.com/MazdaTo" target="_blank" rel="noopener noreferrer">X（お問い合わせ）</a>
          <a href="mailto:toshihide19851113@gmail.com">メールで問い合わせ</a>
        </div>
      </section>

      <section class="section">
        <h2>リンク</h2>
        <div class="links">
          <a href="./privacy.html">プライバシーポリシー</a>
          <a href="#" id="appstore-link">App Store</a>
        </div>
      </section>

      <footer>
        &copy; 2026 Toshihide Matsuda
      </footer>
    </main>
    <script>
      const appStoreLink = document.getElementById("appstore-link");
      if (appStoreLink) {
        appStoreLink.addEventListener("click", (event) => {
          event.preventDefault();
          alert("準備中");
        });
      }
    </script>
  </body>
</html>
